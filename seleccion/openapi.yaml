  # ENDPOINT PRINCIPAL
  # Controlador: mundial.server.vista.rest.RequisicionController
  # ──────────────────────────────────────────────────────────────────────────────
  /requisicion/listarRequisicionesEnCursoPorResposable:
    get:
      tags:
        - Requisiciones
      summary: Lista las requisiciones en curso por responsable
      description: |
        Obtiene un listado paginado de las requisiciones (procesos de selección) que se encuentran
        en curso y están asignadas al usuario administrador o responsable actual.

        El comportamiento varía según el **rol del usuario autenticado**:
        - **ROL_ADMIN_SELECCION**: lista *todas* las requisiciones en curso del sistema.
        - **ROL_ADMINISTRADOR_REGIONAL**: lista las requisiciones de su regional.
        - **Responsable / Psicólogo**: lista únicamente las asignadas a él.

        ### Parámetro `filtrosAdicionales`

        Es un arreglo JSON serializado como string. Cada elemento tiene la forma:
        ```json
        { "tipo": "<TipoFiltro>", "codigoReal": <valor> }
        ```
        Tipos válidos (filtros del mismo tipo actúan como **OR**; entre tipos distintos actúan como **AND**):

        | `tipo`        | Descripción                                          | Tipo de `codigoReal` | Endpoint de catálogo            |
        |---------------|------------------------------------------------------|----------------------|---------------------------------|
        | `Sede`        | Filtra por código de sede                            | integer (Long)       | `/sedesPaginado`                |
        | `Empresa`     | Filtra por código de empresa                         | integer (Long)       | `/ConsultaEmpresasSpring/{negocio}` |
        | `Cliente`     | Filtra por empresa solicitante (cliente externo)     | integer (Long)       | `/ConsultaEmpresasSpring/{negocio}` |
        | `Etapa`       | Filtra por etapa actual del proceso                  | integer (Long)       | `/seleccion/plantillaconfiguracion/etapas-proceso/listar/etapas/{codigoPlantilla}/{listarEtapasSeleccionadas}` |
        | `Cargo`       | Filtra por código de cargo                           | integer              | `/cargosold/getPagin`           |
        | `Tipo`        | Filtra por regla de aprobación (tipo de requisición) | integer (Long)       | `/seleccion/aprobacion/flujosAprobacionAll` |
        | `Solicitante` | Filtra por usuario solicitante                       | integer (Long)       | `/ConsultaUsuariosSpring/{negocio}/{incluirCorporativo}` |

        **Ejemplo completo:**
        ```
        [{"tipo":"Sede","codigoReal":5},
         {"tipo":"Empresa","codigoReal":1},
         {"tipo":"Etapa","codigoReal":12},
         {"tipo":"Etapa","codigoReal":15},
         {"tipo":"Cargo","codigoReal":"520"},
         {"tipo":"Cargo","codigoReal":"522"},
         {"tipo":"Tipo","codigoReal":18},
         {"tipo":"Solicitante","codigoReal":73}]
        ```
      operationId: listarRequisicionesEnCursoPorResposable
      parameters:
        - name: soloTerminados
          in: query
          description: >-
            Si `true`, retorna únicamente las requisiciones en estado terminado/cerrado.
            Si `false` (por defecto), retorna las que están en curso y publicadas.
          required: false
          schema:
            type: boolean
            default: false
        - name: query
          in: query
          description: >-
            Búsqueda de texto libre por número de requisición, nombre de cargo o cargo externo.
          required: false
          schema:
            type: string
          example: "rss"
        - name: filtrosAdicionales
          in: query
          description: >-
            Arreglo JSON serializado con los filtros adicionales. Ver tabla de tipos en la descripción.
          required: false
          schema:
            type: string
          example: '[{"tipo":"Sede","codigoReal":5},{"tipo":"Empresa","codigoReal":1},{"tipo":"Etapa","codigoReal":12}]'
        - name: codCandidato
          in: query
          description: Si se envía, indica si ese candidato ya participa en cada proceso listado.
          required: false
          schema:
            type: integer
            format: int64
        - name: start
          in: query
          description: Índice inicial para la paginación (offset).
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Cantidad máxima de registros a retornar.
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Listado paginado de requisiciones.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  cantidad:
                    type: integer
                    description: Total de registros que coinciden (sin paginación).
                    example: 42
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/DTORequisicion'
                  message:
                    type: string
                    description: Presente solo cuando success=false.
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  # ──────────────────────────────────────────────────────────────────────────────
  # CONFIGURACIÓN UI
  # Controlador: mundial.server.vista.rest.seleccion.PropiedadesSeleccionController
  # Base path: /seleccion/propiedades
  # ──────────────────────────────────────────────────────────────────────────────
  /seleccion/propiedades/estadoCamposOcultablesRequisicion:
    get:
      tags:
        - Configuración UI
      summary: Estado de visibilidad de los campos en Requisiciones
      description: |
        Retorna un mapa con el estado de configuración de visibilidad (visible/oculto) de campos
        y pestañas que se usan al crear o editar una requisición.

        > ⚠️ **Este endpoint debe consultarse antes de renderizar el panel de filtros.**
        > Sus valores determinan qué filtros mostrar al usuario.

        ### Lógica de visibilidad aplicada en la UI

        **1. 🏢 Campo Empresa Solicitante (`tagEmpresaSolicitante`)**

        Solo se muestra cuando se cumplen **ambas** condiciones:

        | Propiedad en respuesta               | Condición |
        |--------------------------------------|-----------|
        | `pestana_informacion_cliente.visible` | `true`    |
        | `campo_infcli_empresasolicitante.visible` | `true` |

        ```
        Si (pestaña cliente visible == true)
           Y (campo empresa solicitante visible == true)
        → Mostrar filtro "Empresa Solicitante"
        En caso contrario → Ocultar
        ```

        **2. 💼 Campo Cargo (`tagCargo`)**

        Se oculta cuando el cargo externo está habilitado:

        | Propiedad en respuesta      | Condición |
        |-----------------------------|-----------|
        | `req_cargo_externo.visible`  | `true`    |

        ```
        Si (cargo externo visible == true) → Ocultar campo "Cargo"
        Si no                              → Mostrar campo  "Cargo"
        ```
      operationId: estadoCamposOcultablesRequisicion
      responses:
        '200':
          description: Mapa de visibilidad de campos y pestañas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  datos:
                    type: object
                    description: >-
                      Mapa de claves de configuración con su estado visible/oculto.
                      Cada clave corresponde a un campo o pestaña configurable.
                    additionalProperties:
                      type: object
                      properties:
                        visible:
                          type: boolean
                          description: Indica si el elemento debe mostrarse en la UI.
                  message:
                    type: string
                    description: Mensaje de error (solo presente cuando success=false).
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

