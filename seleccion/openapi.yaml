      summary: Obtiene la respuesta a una pregunta.
      description: |
        Obtiene la respuesta a una pregunta de la videoentrevista.
      operationId: getRespuestaVideoentrevista
      parameters:
        - name: idRespuestaPregunta
          in: path
          required: true
          schema:
