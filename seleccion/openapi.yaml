        Notifica a una lista de candidatos seleccionados en la etapa de videoentrevista.
      operationId: notificarCandidatosMarcadosVideoentrevista
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                record:
                  type: string
      responses:
        '200':
          description: Notificación enviada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.


