      summary: Lista las empresas activas (para filtros Empresa y Cliente)
      description: |
        Retorna las empresas activas. Si se especifica un negocio, filtra las empresas
        de ese negocio; de lo contrario retorna todas las empresas activas del sistema.

        Se usa para alimentar dos filtros distintos:
        - **Filtro `Empresa`**: empresa interna a la que pertenece la requisición.
        - **Filtro `Cliente`**: empresa solicitante (cliente externo). Solo visible si lo
          habilita `/seleccion/propiedades/estadoCamposOcultablesRequisicion`.

        > Usar `negocio = -1` para obtener todas las empresas sin importar el negocio.
      operationId: consultaEmpresasSpring
      parameters:
