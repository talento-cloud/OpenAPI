        candidato:
          type: integer
          format: int64
        concepto:
          type: string

    EtapaClienteCargarValidacionPerfilResponse:
      type: object
      properties:
        estado:
          type: boolean
        message:
          type: string
        datas:
          type: array
          items:
            type: object
            properties:
              aspiracion_salarial:
                type: integer
                format: int64
              observaciones:
                type: string
              concepto:
                type: string
        tieneEntrevista:
          type: boolean
    DTOEntrevistaJefe:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        candidato:
          type: integer
          format: int64
        requisicion:
          type: integer
          format: int64
