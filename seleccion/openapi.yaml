      summary: Descarga un video de respuesta.
      description: |
        Descarga un video de respuesta de la videoentrevista.
      operationId: descargarVideo
      parameters:
        - name: idRespuestaPregunta
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Video a descargar.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /seleccion/videoentrevista/video/checkCargaS3/{idRespuestaPregunta}:
    get:
      tags:
        - "Videoentrevista (Admin)"
      summary: Verifica si se debe cargar a S3.
      description: |
        Verifica si se debe cargar el video a S3 y obtiene una URL prefirmada.
      operationId: checkCargaS3
      parameters:
        - name: idRespuestaPregunta
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: eliminarPrevio
          in: query
          required: true
          schema:
            type: boolean
        - name: nombreArchivo
          in: query
          required: true
          schema:
            type: string
      responses:
