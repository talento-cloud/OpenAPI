                  type: string
                  format: binary
      responses:
        '200':
          description: Foto cargada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /hv/encuesta_teletrabajo/foto_puesto/descargar/{idHV}:
    get:
      tags:
        - "Teletrabajo"
      summary: Descarga la foto del puesto de trabajo.
      description: |
        Descarga la foto del puesto de trabajo.
      operationId: descargarFotoPuesto
      parameters:
        - name: idHV
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Foto a descargar.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /hv/encuesta_teletrabajo/foto_puesto/checkCargaS3/{hojaVida}:
    get:
      tags:
        - "Teletrabajo"
      summary: Verifica si se debe cargar a S3.
      description: |
        Verifica si se debe cargar la foto del puesto de trabajo a S3 y obtiene una URL prefirmada.
      operationId: checkCargaS3FotoPuesto
      parameters:
        - name: hojaVida
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: eliminarPrevio
          in: query
          required: true
          schema:
            type: boolean
        - name: nombreArchivo
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resultado de la verificación.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  local:
                    type: boolean
                  urlSigned:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.


  /seleccion/videoentrevista/video/cargar/{idRespuestaPregunta}:
