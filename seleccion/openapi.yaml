openapi: 3.0.3
info:
  title: Talento Cloud - API de Selección
  version: 1.3.0
  description: |
    Documentación de los endpoints del módulo de Selección (Requisiciones y Procesos).

    ## Flujo de uso del panel de filtros

    Antes de llamar al endpoint principal, la UI ejecuta en paralelo:

    1. `GET /seleccion/propiedades/estadoCamposOcultablesRequisicion` para determinar qué campos y filtros deben mostrarse u ocultarse.

    2. Los endpoints de catálogo: `/sedesPaginado`, `/ConsultaEmpresasSpring/{negocio}`, `/cargosold/getPagin`, `/ConsultaUsuariosSpring/{negocio}/{incluirCorporativo}`, `/seleccion/plantillaconfiguracion/etapas-proceso/listar/etapas/{codigoPlantilla}/{listarEtapasSeleccionadas}`, y `/seleccion/aprobacion/flujosAprobacionAll`.

    3. Con las selecciones del usuario se construye el parámetro `filtrosAdicionales` y se invoca `GET /requisicion/listarRequisicionesEnCursoPorResposable`.

    ## Manejo de errores

    | Código | Descripción |
    |--------|-------------|
    | `400`  | Parámetros faltantes o con formato inválido. |
    | `401`  | Token JWT inválido, expirado o ausente. |
    | `403`  | El usuario autenticado no tiene permisos suficientes. |
    | `404`  | El recurso solicitado no existe. |
    | `500`  | Error inesperado en el servidor. |

servers:
  - url: https://clientex.talento.cloud/html
    description: Servidor de producción

security:
  - bearerAuth: []

tags:
  - name: Requisiciones
    description: Operaciones sobre procesos de selección (requisiciones).
  - name: Filtros de panel
    description: >-
      Endpoints auxiliares que alimentan los combos del panel de filtros.
      Los valores seleccionados por el usuario se envían como elementos de
      `filtrosAdicionales` al endpoint principal.
  - name: Configuración UI
    description: >-
      Endpoints que controlan la visibilidad de campos y pestañas en la interfaz
      de creación/edición de requisiciones. Deben consultarse antes de renderizar la UI.
  - name: Etapas del Proceso
    description: >-
      Endpoints relacionados con la configuración y consulta de las etapas elegidas
      para una requisición, así como las pruebas psicotécnicas, técnicas, entrevistas
      y assessments asociados.
  - name: Candidatos
    description: >-
      Endpoints para listar y gestionar los candidatos dentro de cada etapa
      del proceso de selección.
  - name: Preselección
    description: >-
      Endpoints específicos de la etapa de Preselección (etapa 3), donde se valida
      el perfil del candidato, se consulta la compatibilidad con IA y se gestionan
      delegaciones.
  - name: Hojas de Vida
    description: >-
      Endpoints relacionados con la gestión de Hojas de Vida, incluyendo notas internas
      y otra información relevante del candidato.
  - name: Filtro Telefónico
    description: >-
      Endpoints para la etapa de Filtro Telefónico (etapa 4), donde se registra
      la información de la llamada y se gestiona la delegación.
  - name: Entrevista Individual
    description: >-
      Endpoints para la etapa de Entrevista Individual por Psicología.
  - name: Visita Domiciliaria
    description: >-
      Endpoints para la etapa de Visita Domiciliaria.
  - name: Etapa cliente
    description: >-
      Endpoints para la etapa de Cliente.
  - name: Entrevista Jefe
    description: >-
      Endpoints para la etapa de Entrevista Jefe (Líder).
  - name: "Entrevista Jefe GH"
    description: >-
      Endpoints para la etapa de Entrevista con el Jefe de Gestión Humana (GH).
  - name: "Autoanálisis"
    description: >-
      Endpoints para gestionar la etapa de Autoanálisis dentro de un proceso de selección.
  - name: "Autoanálisis (Configuración)"
    description: >-
      Endpoints para la configuración global de los formularios de autoanálisis (preguntas y categorías).
  - name: "Autoanálisis (Candidato)"
    description: >-
      Endpoints para la experiencia del candidato al responder el autoanálisis.
  - name: "Videoentrevista"
    description: >-
      Endpoints para la gestión de la etapa de videoentrevista en un proceso de selección.
  - name: "Teletrabajo"
    description: >-
      Endpoints para la gestión de la encuesta de teletrabajo.
  - name: "Oferta Salarial"
    description: >-
      Endpoints para la gestión de la etapa de oferta salarial.
  - name: Assessments
    description: >-
      Endpoints para la creación y consulta de Assessments (Assessment Center).
  - name: Entrevistas Grupales
    description: >-
      Endpoints para la creación, consulta y gestión de Entrevistas Grupales.
  - name: Estudio de seguridad
    description: >-
      Endpoints para la etapa de Estudio de seguridad, donde se registra el resultado y adjuntos.
  - name: "Examen Médico"
    description: >-
      Endpoints para la etapa de Examen Médico, donde se gestiona el encargado de la etapa y se le notifica.
  - name: "Configuración: Observaciones por Defecto"
    description: >-
      Endpoints para gestionar las plantillas de texto (observaciones) que aparecen por defecto en varias etapas del proceso.
  - name: "Configuración: Pruebas Técnicas"
    description: >-
      Endpoints para configurar qué pruebas técnicas se aplican a una requisición.
  - name: "Pruebas Técnicas (Evaluación)"
    description: >-
      Endpoints para evaluar los resultados de las pruebas técnicas de un candidato.
  - name: "Configuración: Pruebas Psicotécnicas"
    description: "Endpoints para configurar qué pruebas psicotécnicas (propias, Moodle, THT, Evalart, etc.) se aplican a una requisición."
  - name: "Pruebas Psicotécnicas (Candidato)"
    description: "Endpoints para realizar acciones sobre las pruebas psicotécnicas de un candidato, como notificarle."

x-tagGroups:
  - name: Etapas del Proceso
    tags:
      - Etapas del Proceso
      - Preselección
      - Filtro Telefónico
      - Entrevista Individual
      - Visita Domiciliaria
      - Etapa cliente
      - Entrevista Jefe
      - "Entrevista Jefe GH"
      - "Autoanálisis"
      - "Autoanálisis (Configuración)"
      - "Autoanálisis (Candidato)"
      - "Videoentrevista"
      - "Teletrabajo"
      - "Oferta Salarial"
      - Assessments
      - Entrevistas Grupales
      - Estudio de seguridad
      - "Examen Médico"
      - "Pruebas Técnicas (Evaluación)"
      - "Pruebas Psicotécnicas (Candidato)"

paths:  # ──────────────────────────────────────────────────────────────────────────────

  /slc/ofertaSalarial/enviarOferta:
    post:
      tags:
        - "Oferta Salarial"
      summary: Envía una oferta salarial a un candidato.
      description: |
        Envía una oferta salarial a un candidato, que puede ser en formato de texto o PDF.
      operationId: enviarOfertaSalarial
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                detalleOferta:
                  type: string
                candidato:
                  type: integer
                  format: int64
                requisicion:
                  type: integer
                  format: int64
                tipoOferta:
                  type: string
                  enum: [PDF, TEXTO]
                adjunto:
                  type: string
                  format: binary
      responses:
        '200':
          description: Oferta enviada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /slc/ofertaSalarial/aceptarOferta/{hash}:
    post:
      tags:
        - "Oferta Salarial"
      summary: Acepta una oferta salarial.
      description: |
        Permite a un candidato aceptar una oferta salarial.
      operationId: aceptarOfertaSalarial
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                observaciones:
                  type: string
      responses:
        '200':
          description: Oferta aceptada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /slc/ofertaSalarial/rechazarOferta/{hash}:
    post:
      tags:
        - "Oferta Salarial"
      summary: Rechaza una oferta salarial.
      description: |
        Permite a un candidato rechazar una oferta salarial.
      operationId: rechazarOfertaSalarial
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                observaciones:
                  type: string
      responses:
        '200':
          description: Oferta rechazada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /slc/ofertaSalarial/getUltimaOferta:
    get:
      tags:
        - "Oferta Salarial"
      summary: Obtiene la última oferta salarial de un candidato.
      description: |
        Obtiene la última oferta salarial de un candidato en una requisición.
      operationId: getUltimaOfertaSalarial
      parameters:
        - name: candidato
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: requisicion
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Última oferta salarial.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlcOfertaSalarial'
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /slc/ofertaSalarial/visualizar/{hash}:
    get:
      tags:
        - "Oferta Salarial"
      summary: Visualiza una oferta salarial.
      description: |
        Visualiza una oferta salarial a través de un hash.
      operationId: visualizarOfertaSalarial
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Oferta salarial.
          content:
            text/html:
              schema:
                type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.


  /hv/encuesta_teletrabajo/getEncuestaTeletrabajoHojaVida/{codHV}:
    get:
      tags:
        - "Teletrabajo"
      summary: Obtiene la encuesta de teletrabajo de una hoja de vida.
      description: |
        Obtiene la encuesta de teletrabajo de una hoja de vida.
      operationId: getEncuestaTeletrabajoHojaVida
      parameters:
        - name: codHV
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Encuesta de teletrabajo.
          content:
            application/json:
              schema:
                type: object
                properties:
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/HVEncuestaTeletrabajo'
                  metadata:
                    $ref: '#/components/schemas/HvTeletrabajoMetadata'
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /hv/encuesta_teletrabajo/guardar/{codHV}:
    post:
      tags:
        - "Teletrabajo"
      summary: Guarda la encuesta de teletrabajo de una hoja de vida.
      description: |
        Guarda la encuesta de teletrabajo de una hoja de vida.
      operationId: guardarEncuestaTeletrabajo
      parameters:
        - name: codHV
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Encuesta guardada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /hv/encuesta_teletrabajo/foto_puesto/cargar/{idHV}:
    post:
      tags:
        - "Teletrabajo"
      summary: Carga una foto del puesto de trabajo.
      description: |
        Carga una foto del puesto de trabajo.
      operationId: cargarFotoPuesto
      parameters:
        - name: idHV
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
