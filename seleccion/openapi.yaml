  # ──────────────────────────────────────────────────────────────────────────────
  # ENTREVISTAS GRUPALES
  # Controlador: mundial.server.vista.rest.EntrevistaValoracionController
  # Base path: /entrevistaValoracion
  # ──────────────────────────────────────────────────────────────────────────────
  /entrevistaValoracion/listar/{codRequi}:
    get:
      tags:
        - Entrevistas Grupales
      summary: Lista las entrevistas grupales de una requisición
      description: |
        Retorna todas las entrevistas de valoración (entrevistas grupales) configuradas
        para la requisición indicada.
      operationId: listarEntrevistasValoracion
      parameters:
        - name: codRequi
          in: path
          description: Código de la requisición.
          required: true
          schema:
            type: integer
            format: int64
          example: 121
        - name: page
          in: query
          description: Número de página (basado en 1).
          required: false
          schema:
            type: integer
            default: 1
        - name: start
          in: query
          description: Índice inicial para la paginación (offset).
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Cantidad máxima de registros a retornar.
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Listado de entrevistas grupales.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Cantidad total de entrevistas.
                    example: 5
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/DTOEntrevistaValoracion'
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /entrevistaValoracion/guardar:
    post:
      tags:
        - Entrevistas Grupales
      summary: Crea o actualiza una Entrevista Grupal.
      description: |
        Guarda una nueva Entrevista Grupal o actualiza una existente si se proporciona un `codigo`.
        El `tipo` interno se establece automáticamente en "Grupal".
      operationId: guardarEntrevistaGrupal
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DTOEntrevistaGrupalRequest'
      responses:
        '200':
          description: Entrevista guardada o modificada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  entrevistaSeleccionar:
                    type: integer
                    format: int64
                    description: ID de la entrevista guardada, para seleccionarla en la UI.
        '400':
          description: Error de formato en la fecha u otro parámetro.
        '403':
          description: Sesión inválida o sin permisos.

  # ──────────────────────────────────────────────────────────────────────────────
  # ENTREVISTA JEFE
  # ──────────────────────────────────────────────────────────────────────────────
  /entrevistaJefe/listar/{codRequi}/{candidato}/{tipoJefe}:
    get:
      tags:
        - Entrevista Jefe
        - "Entrevista Jefe GH"
      summary: Lista las valoraciones de la Entrevista con Jefe o Jefe de GH.
      description: |
        Recupera las valoraciones (concepto y observaciones) de la entrevista con el jefe inmediato (JJ) o con el jefe de Gestión Humana (GH) para un candidato específico en una requisición.

        Si no existe una valoración guardada, puede retornar las observaciones por defecto configuradas para la etapa.
      operationId: listarEntrevistaJefe
      parameters:
        - name: codRequi
          in: path
          description: ID de la requisición.
          required: true
          schema:
            type: integer
            format: int64
        - name: candidato
          in: path
          description: ID del candidato.
          required: true
          schema:
            type: integer
            format: int64
        - name: tipoJefe
          in: path
          description: "Tipo de entrevista a consultar: `JJ` para Jefe Inmediato, `GH` para Jefe de Gestión Humana."
          required: true
          schema:
            type: string
            enum: [JJ, GH]
      responses:
        '200':
          description: Listado de valoraciones.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DTOEntrevistaJefe'
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

  /entrevistaJefe/guardar:
    post:
      tags:
        - Entrevista Jefe
        - "Entrevista Jefe GH"
      summary: Guarda la valoración de la Entrevista con Jefe o Jefe de GH.
      description: |
        Guarda o actualiza el concepto y las observaciones para la entrevista de un candidato. El tipo de entrevista (`JJ` o `GH`) se especifica dentro del objeto `records`.
      operationId: guardarEntrevistaJefe
      requestBody:
        description: Un array JSON serializado como string, conteniendo un único objeto con los datos de la valoración.
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                records:
                  type: string
                  example: '[{"codigo":"","requisicion":123,"candidato":456,"tipojefe":"GH","concepto":"Aprobado","observaciones":"El candidato cumple con el perfil."}]'
                codDelegado:
                  type: integer
                  format: int64
                  description: "Opcional. Si la acción la realiza un delegado, enviar el ID del registro de delegación."
      responses:
        '200':
          description: Valoración guardada.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          description: Parámetros inválidos, como no seleccionar un concepto.
        '403':
          description: Sesión inválida o sin permisos.
