      operationId: guardarAutoanalisis
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                records:
                  type: string
      responses:
        '200':
          description: Fechas guardadas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
