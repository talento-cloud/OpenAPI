      summary: Obtiene las respuestas de un candidato.
      description: |
        Obtiene todas las respuestas de un candidato en una videoentrevista.
      operationId: getRespuestasVideoentrevista
      parameters:
        - name: idRequisicion
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: idCandidato
          in: path
          required: true
          schema:
            type: integer
            format: int64
