          description: Parámetro heredado (deprecated). Enviar `-1`.
          required: true
          schema:
            type: string
          example: "-1"
        - name: modulo
          in: query
          description: Filtra usuarios que tienen licencia del módulo especificado (ej. `SELECCION`).
          required: false
          schema:
            type: string
          example: "SELECCION"
        - name: moreThanCadenaMando
          in: query
          description: >-
            Si `true`, omite la restricción de cadena de mando y lista todos los usuarios
            según los permisos del rol, sin importar si son parte de la jerarquía directa.
          required: false
          schema:
            type: boolean
            default: false
        - name: query
          in: query
          description: Filtro por nombre completo del usuario.
          required: false
          schema:
            type: string
        - name: start
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Listado de usuarios.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cantidad:
                    type: integer
                    example: 35
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/Usuario'
        '403':
          description: Sesión inválida o sin permisos.

  # ──────────────────────────────────────────────────────────────────────────────
  # FILTRO: Etapas de proceso
  # Controlador: mundial.server.vista.rest.seleccion.plantilla.PlantillaConfiguracionController
  # Base path: /seleccion/plantillaconfiguracion
  # ──────────────────────────────────────────────────────────────────────────────
  /seleccion/plantillaconfiguracion/etapas-proceso/listar/etapas/{codigoPlantilla}/{listarEtapasSeleccionadas}:
    get:
      tags:
        - Filtros de panel
      summary: Lista las etapas de proceso disponibles (para filtro Etapa)
      description: |
        Retorna el catálogo de etapas de proceso. Alimenta el combo "Etapa" del panel de filtros.

        Con `codigoPlantilla = -1` y `listarEtapasSeleccionadas = false` se obtiene el listado
        completo de etapas del sistema, independiente de cualquier plantilla.

        Los parámetros `mostrarPreselecion` y `mostrarCierre` controlan si esas etapas
        aparecen en la respuesta, **permitiendo mostrar u ocultar esos elementos en la UI**.

        > El código de etapa seleccionada se envía como `{"tipo":"Etapa","codigoReal":<código>}`
        > dentro de `filtrosAdicionales`.
      operationId: listarEtapasProcesoPlantilla
      parameters:
        - name: codigoPlantilla
          in: path
          description: Código de la plantilla. Usar `-1` para el catálogo completo.
          required: true
          schema:
            type: integer
            format: int64
          example: -1
        - name: listarEtapasSeleccionadas
          in: path
          description: >-
            Si `true`, solo incluye etapas ya seleccionadas en la plantilla.
            Si `false`, lista todas las disponibles.
          required: true
          schema:
            type: boolean
          example: false
        - name: mostrarPreselecion
          in: query
          description: >-
            Controla la visibilidad de la etapa de Preselección en la UI.
            Si `false`, esa etapa no aparecerá en el combo de filtros.
          required: false
          schema:
            type: boolean
            default: false
          example: true
        - name: mostrarCierre
          in: query
          description: >-
            Controla la visibilidad de la etapa de Cierre en la UI.
            Si `false`, esa etapa no aparecerá en el combo de filtros.
          required: false
          schema:
            type: boolean
            default: false
          example: true
        - name: start
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Listado de etapas de proceso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  estado:
                    type: string
                  datas:
                    type: array
                    items:
                      $ref: '#/components/schemas/EtapaProceso'
                  message:
                    type: string
        '403':
          description: Sesión inválida o sin permisos.

  # ──────────────────────────────────────────────────────────────────────────────
  # FILTRO: Flujos de aprobación
  # Controlador: mundial.server.vista.rest.seleccion.AprobacionController
  # Base path: /seleccion/aprobacion
  # ──────────────────────────────────────────────────────────────────────────────
  /seleccion/aprobacion/flujosAprobacionAll:
    get:
      tags:
        - Filtros de panel
      summary: Lista todos los flujos de aprobación activos (para filtro Tipo)
      description: |
        Retorna todos los flujos/reglas de aprobación activos. Alimenta el combo "Tipo" del panel.

        A diferencia de `/seleccion/aprobacion/flujosAprobacionSolicitables`, este endpoint
        devuelve *todos* los flujos sin restricción de rol ni licencia.

        > El código del flujo seleccionado se envía como `{"tipo":"Tipo","codigoReal":<código>}`
        > dentro de `filtrosAdicionales`.
      operationId: flujosAprobacionAll
      parameters:
        - name: start
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Listado de flujos de aprobación.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  cantidad:
                    type: integer
                    example: 3
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReglaAprobacion'
        '403':
          description: Sesión inválida o sin permisos.

  # ──────────────────────────────────────────────────────────────────────────────
  # ETAPAS ELEGIDAS
  # Controlador: mundial.server.vista.rest.EtapasElegidasController
  # Base path: /etapasElegidas
  # ──────────────────────────────────────────────────────────────────────────────
  /etapasElegidas/listar/{codRequi}:
    get:
      tags:
        - Etapas del Proceso
      summary: Lista las etapas elegidas de una requisición
      description: |
        Retorna todas las etapas que fueron seleccionadas (elegidas) para el proceso de selección
        de una requisición determinada.

        Cuando se invoca desde la pantalla de **procesos en curso** (`paraEnProceso=true`), se
        enriquece cada etapa con datos de delegación, conteos de candidatos aprobados/rechazados
        y el total de candidatos.

        El parámetro `valOfertaSalarial` controla si se aplican reglas de visibilidad sobre la
        etapa de Oferta Salarial, basándose en la propiedad `SLC_OFERTASALARIAL_ETAPA_GESTIONADOR`
        y el permiso `PERMISO_SLC_OFERTASALARIAL_MANEJOETAPA`.

      operationId: listarEtapasElegidas
      parameters:
        - name: codRequi
          in: path
          description: Código de la requisición.
          required: true
          schema:
            type: integer
            format: int64
          example: 121
        - name: paraEnProceso
          in: query
          description: >-
            Indica que la consulta se realiza desde la pantalla de procesos en curso.
            Si `true`, se agregan datos de delegación y conteos de candidatos.
          required: false
          schema:
            type: boolean
            default: false
        - name: valOfertaSalarial
          in: query
          description: >-
            Si `true`, valida si la etapa de oferta salarial debe ocultarse u ofuscarse
            según reglas de configuración y permisos del usuario.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Listado de etapas elegidas.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  datos:
                    type: array
                    items:
                      $ref: '#/components/schemas/DTOEtapasElegidas'
                  message:
                    type: string
                    description: Presente solo cuando success=false.
        '403':
          description: Sesión inválida o sin permisos.
        '500':
          description: Error interno del servidor.

