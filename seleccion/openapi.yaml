components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    Sede:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
    Empresa:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
    Cargo:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
    Usuario:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombreCompleto:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        activo:
          type: boolean
    EtapaProceso:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
        orden:
          type: integer
        mostrarPreselecion:
          type: boolean
        mostrarCierre:
          type: boolean
    ReglaAprobacion:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        activo:
          type: boolean
    DTORequisicion:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        estado:
          type: string
        fechaCreacion:
          type: string
          format: date-time
        responsable:
          $ref: '#/components/schemas/Usuario'
        vacantes:
          type: integer
        empresa:
          $ref: '#/components/schemas/Empresa'
        sede:
          $ref: '#/components/schemas/Sede'
        cargo:
          $ref: '#/components/schemas/Cargo'
        etapaActual:
          $ref: '#/components/schemas/EtapaProceso'
        candidatos:
          type: integer
        candidatosNuevos:
          type: integer
        compatibilidadIA:
          type: number
          format: float
        porcentajeAjusteAI:
          type: integer
          format: int32
          description: Porcentaje de ajuste según la IA.
    DTOEtapasElegidas:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        orden:
          type: integer
        delegado:
          type: string
          description: Nombre del usuario delegado para esta etapa.
        aprobados:
          type: integer
          description: Cantidad de candidatos aprobados en esta etapa.
        rechazados:
          type: integer
          description: Cantidad de candidatos rechazados en esta etapa.
        totalCandidatos:
          type: integer
          description: Total de candidatos en esta etapa.
        estado:
          type: string
          description: Estado de la etapa (ej. "PENDIENTE", "EN_PROGRESO", "FINALIZADA").

    DTOPsicotecnicaRequisicionResponse:
      type: object
      properties:
        total:
          type: integer
        datos:
          type: array
          items:
            type: object
            properties:
              codigo:
                type: integer
                format: int64
              nombre:
                type: string
              prueba:
                type: string
              tipo:
                type: string
              activa:
                type: boolean
              obligatoria:
                type: boolean
              online:
                type: boolean
              idExterno:
                type: string
              moodle:
                type: boolean
              tth:
                type: boolean
              evalart:
                type: boolean
    DTOPsicotecnicaCandidato:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        candidato:
          type: integer
          format: int64
        requisicion:
          type: integer
          format: int64
        prueba:
          type: integer
          format: int64
        concepto:
          type: string
        analisis:
          type: string
        archivoAdjunto:
          type: string
        nombreArchivo:
          type: string
    DTOPruebaTecnicaRequisicion:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        prueba:
          type: string
        tipo:
          type: string
        activa:
          type: boolean
        obligatoria:
          type: boolean
        online:
          type: boolean
        idExterno:
          type: string
        moodle:
          type: boolean
        tth:
          type: boolean
        evalart:
          type: boolean
    PruebaTecnicaGral:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
    DTOEntrevistaValoracion:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
        nombre:
          type: string
        tipo:
          type: string
        fecha:
          type: string
          format: date
        hora:
          type: string
          format: time
        lugar:
          type: string
        candidatos:
          type: integer
        responsables:
          type: array
          items:
            $ref: '#/components/schemas/Usuario'
    DTOEntrevistaGrupalRequest:
      type: object
      properties:
        codigo:
          type: integer
          format: int64
          description: Código de la entrevista (para actualizar).
        requisicion:
          type: integer
          format: int64
          description: Código de la requisición.
        nombre:
          type: string
          description: Nombre de la entrevista.
        fecha:
          type: string
          format: date
          description: Fecha de la entrevista (formato YYYY-MM-DD).
        hora:
          type: string
          format: time
          description: Hora de la entrevista (formato HH:MM).
        lugar:
          type: string
          description: Lugar de la entrevista.
        responsables:
          type: string
          description: "IDs de los usuarios responsables en formato JSON (ej. `[1,2,3]`)."
          example: "[1,2,3]"
    GuardarObservacionesRequest:
      type: object
      properties:
        records:
          type: string
          description: >-
            Un array JSON como string. Cada objeto en el array debe contener `etapa`,
            `observacion`, `idObservacion` (opcional, para actualización) y `estudioSeguridad`
            (boolean, para indicar si es observación de estudio de seguridad).
    DTOEtapaCandidato:
      type: object
      properties:
        codigoCandidato:
          type: integer
          format: int64
        nombreCandidato:
          type: string
        apellidoCandidato:
          type: string
        numeroDocumento:
          type: string
        profesion:
          type: string
        porcentajeAjuste:
          type: number
          format: float
        ans:
          type: string
        estado:
          type: string
        fechaUltimoCambioEstado:
          type: string
          format: date-time
    DTOAprobacionMasivaResultado:
      type: object
      properties:
        aprobados:
          type: integer
        descartados:
          type: integer
        fallidos:
          type: integer
    DTOValidacionPerfil:
      type: object
      properties:
        concepto:
          type: string
        observaciones:
          type: string
        evaluador:
          type: string
          description: Nombre del evaluador que realizó la validación.
        fechaValidacion:
          type: string
          format: date-time
        delegado:
          type: string
          description: Nombre del usuario al que se delegó la validación (si aplica).
    CargarArchivosGuardarRequest:
      type: object
      description: >-
        Parámetros enviados como formulario urlencoded para guardar los datos de una etapa que maneja archivos.
        El objeto principal se envía como un string JSON dentro del campo `records`.
      required:
        - records
      properties:
        records:
          type: string
          description: Un array JSON como string, que contiene un objeto con los datos a guardar.
          example: '[{"codigo":1,"requisicion":123,"candidato":456,"concepto":"Aprobado","observaciones":"El candidato cumple con los requisitos.","etapa":15}]'
          content:
            application/json:
              schema:
                type: object
                properties:
                  codigo:
                    type: integer
                    format: int64
                    description: ID del registro a actualizar (opcional, solo para modificaciones).
                  requisicion:
                    type: integer
                    format: int64
                    description: ID de la requisición.
                  candidato:
                    type: integer
                    format: int64
                    description: ID del candidato.
                  concepto:
                    type: string
                    description: Concepto o resultado de la evaluación en la etapa.
                  observaciones:
                    type: string
                    description: Observaciones adicionales.
                  etapa:
                    type: integer
                    format: int64
                    description: ID de la etapa a la que pertenecen los datos.

    CargarArchivosListarResponse:
      type: object
      description: Datos recuperados de un estudio de seguridad previamente guardado.
      properties:
        total:
          type: integer
        datos:
          type: array
          items:
            type: object
            properties:
              codigo:
                type: integer
                format: int64
              concepto:
                type: string
              observaciones:
                type: string
              nombreOriginal:
                type: string
              extension:
                type: string
              delegadoEtapa:
                type: object
                nullable: true
    EnviarCorreoRequest:
      type: object
      description: >-
        Parámetros enviados como formulario urlencoded para enviar correos a los candidatos de una etapa.
        El objeto principal se envía como un string JSON dentro del campo `record`.
      required:
        - record
      properties:
        record:
          type: string
          description: Un array JSON como string, que contiene un objeto con los datos a enviar.
          example: '{"codigoRequisicion":123,"continuan":[{"codCandidato":456}],"descartados":[],"etapa":15}'
          content:
            application/json:
              schema:
                type: object
                properties:
                  codigoRequisicion:
                    type: integer
                    format: int64
                  continuan:
                    type: array
                    items:
                      type: object
                      properties:
                        codCandidato:
                          type: integer
                          format: int64
                  descartados:
                    type: array
                    items:
                      type: object
                      properties:
                        codCandidato:
                          type: integer
                          format: int64
                  etapa:
                    type: integer
                    format: int64

    EtapaClienteGuardarRequest:
      type: object
      properties:
        txtSalario:
          type: integer
          format: int64
        observaciones:
          type: string
        requisicion:
          type: integer
          format: int64
        candidato:
          type: integer
          format: int64
        concepto:
          type: string

    EtapaClienteCargarResponse:
      type: object
