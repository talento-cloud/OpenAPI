openapi: 3.0.0
info:
  title: API Competencias360
  contact: {}
  version: '1.0'
  description: >-
    Esta API permite acceder a la información de las competencias y comportamientos de los colaboradores de una empresa.

    ## Manejo de errores


        Los errores habituales pueden incluir:


        - `400 Bad Request`: Parámetros requeridos faltantes o con formato
        inválido.
            
        - `401 Unauthorized`: Token JWT inválido, expirado o ausente.
            
        - `403 Forbidden`: El usuario autenticado no tiene permisos suficientes.
            
        - `404 Not Found`: El recurso solicitado no existe.
            
        - `500 Internal Server Error`: Error inesperado en el servidor.
            

        Cuando sea posible, cada endpoint detallará sus códigos de error
        específicos y estructura de respuesta en su propia descripción.
servers:
  - url: https://clientex.talento.cloud/api/html
    description: Servidor de producción  
    variables: {}
paths:
  /valoracion360/acordeon/listar-preguntas/{codEvaluacion360}/{codAsignacion2}/{idDuenio}.json:
    get:
      tags:
      - Acordeon
      summary: listarCuestionario
      description: "A diferencia del estándar que solo carga una pregunta por vez para el acordeón cargaremos varias.\n\nAl elegir un colaborador a evaluar se listará las competencias y comportamientos asociados para que el frontend elija si mostrará por competencia o todo en una sola hoja.  \nNecesitamos un JWT, accedemos al servicio REST tipo GET en la url endpoint  \n{urlBaseTalento}/html/valoracion360/acordeon/listar-preguntas/{{codEvaluacion360}}/  \n{{codAsignacion2}}/{{idDuenio}}.json\n\nLo anterior listará las competencias a evaluar al usuario, donde por cada competencia también se  \ntendrá las preguntas/comportamientos asociados y por cada comportamiento los niveles de  \ncalificación que aplica, inclusive si ya estaba calificado el nivel elegido tendrá una marca sobre esto.  \nTambién nos dirá si el comportamiento ya tiene fortalezas, oportunidades u observaciones  \nregistradas.  \nEn la raíz del json de respuesta también nos dirá si debe usar selección múltiple normal o con estrellas  \ncon la propiedad “descriptorEstrellas”"
      operationId: listarCuestionario
      parameters:
      - name: codEvaluacion360
        in: path
        description: ''
        required: true
        schema:
          type: string
      - name: codAsignacion2
        in: path
        description: ''
        required: true
        schema:
          type: string
      - name: idDuenio
        in: path
        description: ''
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          headers: {}
      deprecated: false
  /valoracion360/acordeon/guardar-cuestionario.json:
    post:
      tags:
      - Acordeon
      summary: guardarRespuesta
      description: "Para guardar la respuesta a una pregunta dada por el evaluador.  \nNecesitamos un JWT, accedemos al servicio REST tipo GET en la url endpoint  \n{urlBaseTalento}/html/valoracion360/acordeon/guardar-cuestionario.json"
      operationId: guardarRespuesta
      parameters:
      - name: asignacion
        in: query
        description: Código asignación
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: 16913
      - name: codigo
        in: query
        description: Código de la pregunta
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: 7680
      - name: resultado
        in: query
        description: Nivel calificado
        required: true
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: 80
      - name: fortalezas
        in: query
        description: Texto de la fortaleza para la pregunta (opcional)
        required: true
        style: form
        explode: true
        schema:
          type: string
      - name: oportunidades
        in: query
        description: Texto de la oportunidad para la pregunta (opcional)
        required: true
        style: form
        explode: true
        schema:
          type: string
      - name: observaciones
        in: query
        description: Texto de la observación para la pregunta (opcional)
        required: true
        style: form
        explode: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          headers: {}
      deprecated: false
