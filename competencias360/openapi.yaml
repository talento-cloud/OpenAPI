        in: query
        description: Puede ser obligatorio según configuraciones
        required: true
        style: form
        explode: true
        schema:
          type: string
          example: Eres una excelente persona y como parte del equipo siento que eres una parte fundamental de élOrganizado, capaz y con amplias actitudes de Líder.Me encantaría verte mas fuerte con competencias de liderazgo y gestion de equipos, creo que tienes oportunidades en ese sentido
      - name: codAsignacion2
        in: path
        description: ''
        required: true
        schema:
          type: string
      responses:
        '200':
          description: ''
          headers: {}
      deprecated: false
  /operativos/cantidadPreguntasEvaluacion/.json:
    get:
      tags:
      - Calibracion
      summary: cantidadPreguntasEvaluacion
      description: "### Endpoint Description\n\nThis endpoint retrieves the total number of questions evaluated for a specific process identified by `codProceso360`.\n\n### Request\n\n- **Method**: GET\n    \n- **URL**: `{{urlBaseTalento}}/html/operativos/cantidadPreguntasEvaluacion/{{codProceso360}}.json`\n    \n- **Headers**:\n    \n    - Content-Type: application/json\n        \n\n### Response\n\n- **Status Code**: 200 OK\n    \n- **Content-Type**: application/json\n    \n- **Response Body**:\n    \n    - `totalCalificados`: Integer representing the total number of questions that have been evaluated.\n        \n    - `totalPorCalificar`: Integer representing the total number of questions that are yet to be evaluated.\n        \n\n### Example Response\n\n``` json\n{\n  \"totalCalificados\": 0,\n  \"totalPorCalificar\": 0\n}\n\n ```\n\nThis response indicates that there are currently no questions evaluated and none pending evaluation for the specified process."
      operationId: cantidadPreguntasEvaluacion
      parameters: []
      responses:
        '200':
          description: ''
          headers: {}
      deprecated: false
