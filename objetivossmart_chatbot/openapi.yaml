        - codigo: 5
          porcentaje_definicion_pendiente: 2
          porcentaje_definicion_total: 2
          porcentaje_definicion_creado: 0
          nombre: Objetivos de desarrollo
        - codigo: 6
          porcentaje_definicion_pendiente: 3
          porcentaje_definicion_total: 3
          porcentaje_definicion_creado: 0
          nombre: Mis objetivos
        - codigo: 7
