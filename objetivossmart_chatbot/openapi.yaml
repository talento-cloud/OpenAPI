        - codigo: 2
          porcentaje_definicion_pendiente: 0
          porcentaje_definicion_total: 25
          porcentaje_definicion_creado: 25
          nombre: Objetivos de área
        - codigo: 3
          porcentaje_definicion_pendiente: 25
          porcentaje_definicion_total: 25
          porcentaje_definicion_creado: 0
          nombre: Desarrollo individual
        - codigo: 4
          porcentaje_definicion_pendiente: 1
          porcentaje_definicion_total: 1
          porcentaje_definicion_creado: 0
