          porcentaje_definicion_total: 4
          porcentaje_definicion_creado: 0
          nombre: Objetivos genéricos
        porcentaje_definicion_avance_general: 75
    Proceso:
      title: Proceso
      required:
      - codigo
      - nombre
      type: object
      properties:
        codigo:
          type: integer
          format: int32
        nombre:
          type: string
      example:
        codigo: 2024
        nombre: '2025'
    TiposObjetivo:
      title: TiposObjetivo
      required:
      - codigo
      - porcentaje_definicion_pendiente
      - porcentaje_definicion_total
      - porcentaje_definicion_creado
      - nombre
      type: object
      properties:
        codigo:
          type: integer
          format: int32
        porcentaje_definicion_pendiente:
          type: integer
          format: int32
        porcentaje_definicion_total:
          type: integer
          format: int32
        porcentaje_definicion_creado:
          type: integer
          format: int32
        nombre:
          type: string
      example:
        codigo: 1
        porcentaje_definicion_pendiente: 0
        porcentaje_definicion_total: 50
        porcentaje_definicion_creado: 50
        nombre: Objetivos estratégicos
  securitySchemes:
