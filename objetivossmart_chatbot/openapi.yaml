      deprecated: false
components:
  schemas:
    procesosActivos:
      title: procesosActivos
      required:
      - data
      - success
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Datum'
          description: ''
        success:
          type: boolean
      example:
        data:
        - actual: true
          codigo: 2026
          estado: EN_PROCESO
          nombre: 2026A
        - codigo: 2024
          estado: EN_PROCESO
          nombre: '2025'
        success: true
    Datum:
      title: Datum
      required:
      - codigo
      - estado
      - nombre
      type: object
      properties:
        actual:
          type: boolean
        codigo:
          type: integer
          format: int32
        estado:
          type: string
        nombre:
          type: string
      example:
        actual: true
        codigo: 2026
        estado: EN_PROCESO
        nombre: 2026A
    resumenDefinicionAcuerdo:
      title: resumenDefinicionAcuerdo
      required:
      - data
      - success
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Data'
        success:
          type: boolean
      example:
        data:
          proceso:
            codigo: 2024
            nombre: '2025'
          tipos_objetivos:
          - codigo: 1
            porcentaje_definicion_pendiente: 0
            porcentaje_definicion_total: 50
            porcentaje_definicion_creado: 50
            nombre: Objetivos estratégicos
          - codigo: 2
            porcentaje_definicion_pendiente: 0
            porcentaje_definicion_total: 25
            porcentaje_definicion_creado: 25
            nombre: Objetivos de área
          - codigo: 3
            porcentaje_definicion_pendiente: 25
            porcentaje_definicion_total: 25
            porcentaje_definicion_creado: 0
            nombre: Desarrollo individual
          - codigo: 4
            porcentaje_definicion_pendiente: 1
            porcentaje_definicion_total: 1
            porcentaje_definicion_creado: 0
            nombre: Plan de desarrollo
          - codigo: 5
            porcentaje_definicion_pendiente: 2
            porcentaje_definicion_total: 2
            porcentaje_definicion_creado: 0
            nombre: Objetivos de desarrollo
          - codigo: 6
            porcentaje_definicion_pendiente: 3
            porcentaje_definicion_total: 3
            porcentaje_definicion_creado: 0
            nombre: Mis objetivos
          - codigo: 7
            porcentaje_definicion_pendiente: 4
            porcentaje_definicion_total: 4
            porcentaje_definicion_creado: 0
            nombre: Objetivos genéricos
          porcentaje_definicion_avance_general: 75
        success: true
    Data:
      title: Data
      required:
      - proceso
      - tipos_objetivos
      - porcentaje_definicion_avance_general
      type: object
      properties:
        proceso:
          $ref: '#/components/schemas/Proceso'
        tipos_objetivos:
          type: array
          items:
            $ref: '#/components/schemas/TiposObjetivo'
          description: ''
        porcentaje_definicion_avance_general:
          type: integer
          format: int32
      example:
        proceso:
          codigo: 2024
          nombre: '2025'
        tipos_objetivos:
        - codigo: 1
          porcentaje_definicion_pendiente: 0
          porcentaje_definicion_total: 50
