          enum: [SI, NO, ""]
        idExternoCargo:
          type: string
        documentoLiderFunciona:
          type: string
        nombreLiderFunciona:
          type: string
        tiempoLaborado:
          type: string
          description: Indica el porcentaje de tiempo que el colaborador labora en la empresa (ejemplo Medio tiempo 50%).
        etiquetas:
          type: string
          description: Múltiples registros de etiquetas sin repetir, separados por ";" cumpliendo el formato etiqueta:valor (Ej. Sistema operativos:windows; Sistemas operativos:macOS).
        diasVacaciones:
          type: string
          description: Días disponibles de vacaciones. Solo se permiten valores numéricos (enteros o decimales) positivos.
        moduloEncuesta:
          type: string
          nullable: true
          description: Determina si tiene licencia en este módulo. Valores permitidos SI/NO o nulo/vacío.
          enum: [SI, NO, ""]
        moduloOnboarding:
