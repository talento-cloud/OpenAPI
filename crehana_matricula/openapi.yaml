            description: '<p>Aprender CSS desde cero es el primer paso para lograr que un sitio web se vea bien en todas las pantallas y dispositivos. Por ello, en este curso de CSS desde cero, comprenderás cuáles son los elementos básicos de estilo de un sitio web y entenderás cómo utilizar la sintaxis, efectos y controles visuales de los estilos CSS.&nbsp;</p><ul><li>Comprenderás qué es CSS, su relación con HTML y revisarás conceptos básicos sobre la sintaxis.</li><li>Descubrirás qué son los selectores CSS y cómo definir colores, texto, dimensiones y posiciones de los elementos.</li><li>Aprenderás a usar CSS para posicionamiento y alineación y lo aplicarás a elementos HTML.</li><li>Entenderás qué es mobile first y cómo realizar un diseño responsive usando CSS.</li></ul><p><strong>Nivel del curso</strong><br />Este curso de CSS desde cero es de nivel introductorio, sin embargo, es ideal que cuentes con conocimientos básicos sobre lenguaje de maquetado HTML, estructura de sitios web e interactividad de un sitio web para poder trabajar en el proyecto.</p><p>Este curso está dirigido a cualquier persona que esté interesada en el diseño o desarrollo web y puede ser especialmente útil para diseñadores UI/UX, programadores y maquetadores web.</p><p><strong>¿Qué necesito?</strong></p><ul><li>Computador o laptop con conexión a internet.</li><li>Un editor de texto (en el curso se utilizará Atom).&nbsp;</li></ul><p><strong>¿Qué habilidades desarrollaré?</strong></p><ul><li>CSS: Aprenderás CSS desde cero para lograr sitios web que se vean bien y sean congruentes.</li><li>Fundamentos web: Adquirirás conocimientos teórico-prácticos sobre la creación de sitios web para diferentes dispositivos digitales.</li><li>Manejo del editor de texto: Lograrás crear sitios web paso a paso.&nbsp;<br />&nbsp;</li></ul>'
