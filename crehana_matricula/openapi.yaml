        image_url: https://crehana-public-catalog.imgix.net//images/courses/promo-images/140c642e/3b1da355.jpg
        description: '<p>Conocer los fundamentos de HTML y de CSS te permitirá estructurar y definir el estilo de cualquier página web. Es el paso inicial de todo desarrollador Front End y el paso siguiente a la entrega de un diseño web, convirtiendo este último en código HTML.</p><p>Este <strong>curso de HTML y CSS</strong> te llevará desde cero a un nivel en el que podrás convertir cualquier diseño, ya sea una imagen o un .psd, a código HTML. Descubrirás temas como la funcionalidad de un navegador, introducción a HTML, etiquetas y atributos, formularios web, HTML gráfico, introducción a CSS, selectores, diseño web responsivo, animaciones y mucho más.</p><p>Soy Sergio Agamez, diseñador y desarrollador web con más de 9 años de experiencia. Soy amante de la tecnología desde niño y me especializo en áreas que me permiten brindar soluciones flexibles, ágiles y del más alto nivel.</p><p><strong>¿QUÉ INCLUYE ESTE CURSO?</strong></p><p>En este <strong>curso de HTML y CSS</strong>, descubrirás:</p><p>- Funcionalidad de un navegador<br>- Introducción a HTML<br>- Organización de archivos y programas a utilizar<br>- Etiquetas y atributos<br>- Formularios web<br>- Otras etiquetas<br>- Etiquetas multimedia<br>- HTML Gráfico<br>- Introducción a CSS<br>- Selectores<br>- Pseudoclases y pseudoelementos<br>- Modelo de caja, su flujo y posicionamiento<br>- Propiedades para texto y fuente<br>- Propiedades de visualización<br>- Diseño web responsivo<br>- Patrones de diseño adaptativo<br>- Transformaciones<br>- Animaciones<br>- Filtros<br>- Creación y presentación de tu propia página web</p><p><strong>¿QUÉ PROYECTO VAS A REALIZAR?</strong></p><p>Al finalizar este <strong>curso de HTML y CSS</strong> podrás crear tu propio proyecto final, compartiéndolo en la galería de proyectos para recibir feedback del profesor, staff de Crehana y compañeros del curso. En esta ocasión, deberás de aplicar todo lo aprendido para maquetar una página web utilizando código Front End: HTML y los estilos en cascada o CSS. Podrás convertir un archivo psd descargado del curso o uno propio.</p><p><strong>¿QUÉ VAS A LOGRAR CON ESTE CURSO?</strong></p><p>Al finalizar este <strong>curso de HTML y CSS</strong> podrás iniciar tu carrera como desarrollador Front End, manejando a nivel intermedio el lenguaje HTML y CSS. Con un poco de práctica e investigación podrás especializarte y desarrollar páginas web como un experto. ¡Inicia ya!</p>'
