                        image_url: https://crehana-public-catalog.imgix.net//images/courses/promo-images/44bc6c76/91e71ac9.png
                        description: <p>En el desarrollo Front-end de sitios web y aplicaciones móviles es importante utilizar herramientas que permitan ser más eficiente y rápido en la maquetación, por ello utilizamos Bootstrap 4. Es uno de los Framework más populares en todo el mundo, utilizado para crear sitios web y aplicaciones adaptables a diferentes tamaños de pantalla.<br /><br />Mi nombre es Sergio Agámez y soy desarrollador web. He trabajado con clientes de Europa&nbsp; y América Latina con más de 2 años de experiencia creando sitios web y aplicaciones móviles, lo cual me ha permitido conocer distintos tipos de personas y tener grandes resultados, utilizando herramientas que facilitan el desarrollo como Bootstrap 4.<br /><br />Este curso de Bootstrap 4 te permitirá conocer desde cero lo que es un Framework, cómo instalar Bootstrap 4 y cómo usarlo para crear un sitio web, aún si nunca has utilizado un Framework. Durante las clases aprenderemos paso a paso los diferentes componentes de bootstrap, de forma completamente práctica y realizaremos un sitio web desde cero adaptable a todos los dispositivos.<br /><br /><br /><br /><strong>¿Qué incluye este curso?</strong><br /><br />En este curso de Bootstrap 4 aprenderás:<br /><br />- Qué es un Framework y por qué elegir Bootstrap 4<br />- Cómo desarrollar con el sistema de Rejilla<br />- Elementos generales de Bootstrap 4<br />- Componentes y utilidades que podemos utilizar<br />- Cómo desarrollar un sitio web desde cero utilizando Bootstrap 4&nbsp;<br /><br /><br /><br /><strong>¿Qué proyecto vas a realizar?</strong><br /><br />Durante el curso aprenderemos a realizar un sitio web desde cero con Bootstrap 4. Al finalizar deberás realizar un sitio web desde cero o desde un diseño que tengas, utilizando el sistema de rejilla de Bootstrap y aplicando clases de color y texto; también podrás usar componentes aprendidos.</p><p><br /><br /><strong>¿Qué vas a lograr con este curso?</strong><br /><br />Al finalizar el curso Bootstrap 4&nbsp;podrás empezar a desarrollar sitios web y perfeccionarlos para trabajar con clientes.</p><p>&nbsp;</p>
                        course_level:
                          name: Introductorio
              example:
                action: "Completar los cursos de Crehana 'Introducción al Desarrollo Web front end: HTML y CSS desde cero' y 'CSS desde cero' para establecer bases sólidas, seguido de 'Introducción a HTML' para reforzar la estructura semántica. Posteriormente, aplicar los conocimientos en un proyecto final personal donde se recree la interfaz de una aplicación web real (como Spotify o Netflix) utilizando HTML semántico y CSS moderno (Flexbox, Grid, variables CSS y media queries), documentando el proceso en un repositorio de GitHub con README detallado. Como extensión opcional, completar 'Técnicas avanzadas de styling: Sass y SCSS' y 'Bootstrap desde cero: Construye sitios web responsive' para ampliar las capacidades de desarrollo."
                expected_result: Certificados de finalización de los cursos de Crehana completados, un repositorio público con el proyecto final que demuestre dominio de maquetación responsive, estructura semántica HTML, aplicación de estilos CSS fundamentales y avanzados, con al menos 3 commits documentados que muestren la evolución del desarrollo. Si se completan los cursos adicionales, se evidenciará uso de preprocesadores Sass/SCSS y/o implementación de componentes responsive con Bootstrap 4.
                required_resources: "Computadora con conexión a internet; suscripción activa a Crehana para acceder a los cursos 'Introducción al Desarrollo Web front end: HTML y CSS desde cero', 'CSS desde cero', 'Introducción a HTML', y opcionalmente 'Técnicas avanzadas de styling: Sass y SCSS' y 'Bootstrap desde cero: Construye sitios web responsive'; cuenta en GitHub (github.com); editor de código Visual Studio Code con extensiones Live Server y Prettier; navegador Chrome o Firefox con DevTools; 20 horas de dedicación distribuidas en 4 semanas; mentor o compañero de estudio para revisión de código vía Discord o similar (opcional pero recomendado)."
