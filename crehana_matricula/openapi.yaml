            description: '<p>Escribir en CSS puede volverse muy confuso. Por esta razón, los preprocesadores de CSS, como Sass, son herramientas geniales para crear los estilos que tienes en mente en la menor cantidad de tiempo. En este curso aprenderás a usar Sass, uno de los preprocesadores más utilizados hoy en día en el desarrollo front-end.</p><ul><li>Entenderás cómo funcionan los preprocesadores CSS y, en específico, cómo usar Sass para el desarrollo front-end.</li><li>Comprenderás las características principales de Sass y las diferencias entre las sintaxis Scss y Sass directo.</li><li>Serás capaz de identificar en qué casos es recomendable usar Sass y cómo sacar el máximo provecho de él.</li><li>Aprenderás a implementar conceptos complejos como los módulos de Sass, sus funciones, y podrás crear funciones personalizadas.</li></ul><p><strong>Nivel del curso</strong></p><p>Este es un curso de nivel intermedio, ya que es necesario tener conocimiento de CSS y de los principios de diseño web con HTML y CSS para tomar el curso.<br />El curso de Sass está dirigido a personas que estén interesadas en utilizar esta tecnología o quieran aprender técnicas avanzadas de CSS, así como para desarrolladores que buscan maneras de optimizar su proceso de maquetación y estilo.</p><p><strong>¿Qué necesito?</strong></p><ul><li>Computador o laptop con conexión a internet.</li><li>Contar con un editor de texto o código como Visual Studio Code</li><li>Estar familiarizado con Git y Github</li><li>Conocimiento de los principios de diseño web con HTML y CSS.</li><li>Utilizar las plantillas HTML facilitadas por la profesora para desarrollar tu proyecto final.</li><li>Acceder al&nbsp;<a target="_blank" href="https://github.com/crehana-studentxp/sass_scss_tecnicas_avanzadas-karen_chizon">repositorio de GitHub del curso</a>.</li><li>Estar familiarizado con el uso de la terminal o preferentemente Bash.</li></ul><p><strong>¿Qué habilidades desarrollaré?</strong></p><ul><li>Hojas de estilo: Lograrás convertir tus archivos .scss o .sass en una hoja de estilo CSS estándar usando Sass.</li><li>Sass: Aprenderás cómo funciona Sass y cómo implementar sus diversas funcionalidades de forma práctica.</li><li>Desarrollo Web: Serás capaz de optimizar el desarrollo de páginas web aplicando técnicas avanzadas de CSS con Sass.</li></ul>'
            course_level:
              name: Intermedio
