            description: '<p>Aprender HTML para desarrollar páginas web es indispensable en el mundo actual, en el que la presencia digital cumple un rol primordial para la comunicación de organizaciones y personas.&nbsp;Por ello, en este curso de introducción al HTML aprenderás cómo funciona el HTML de las páginas web y, junto a Federico Ponte, descubrirás los elementos más importantes al trabajar desarrollar websites.</p><ul><li>Aprenderás los fundamentos básicos del lenguaje HTML para el diseño de páginas web desde cero.</li><li>Entenderás qué son las etiquetas, cómo maquetar un sitio web y cómo organizar la información de tus páginas.</li><li>Descubrirás qué es un formulario, cuáles son sus elementos y cómo utilizarlos para obtener información del usuario.</li><li>Aprenderás cómo inspeccionar otras web, generar etiquetas avanzadas y utilizar el inspector web de Google Chrome.</li></ul><p><strong>Nivel del curso</strong><br />El curso de introducción al lenguaje HTML es de nivel introductorio, ya que no necesitas ningún conocimiento previo o tener instalado algún software para inscribirte al curso. Este curso está dirigido a todas aquellas personas que desean adquirir conocimientos básicos de HTML y sobre los principios del desarrollo de sitios web.</p><p><strong>¿Qué necesito?</strong></p><ul><li>Computadora o laptop con conexión a internet.</li><li>Atom para edición de sitios web.</li></ul><p><strong>¿Qué habilidades desarrollaré?</strong></p><ul><li>HTML: Adquirirás conocimientos básicos sobre el lenguaje de programación HTML para la creación de sitios web.</li><li>Fundamentos web: Entenderás cuáles son los principios del desarrollo web a tener en cuenta al maquetar páginas web.</li><li>Manejo de editor de código: Serás capaz de manejar editores de código HTML para construir sitios web desde cero.<br />&nbsp;</li></ul>'
