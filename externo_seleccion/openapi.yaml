openapi: 3.0.0
info:
  title: API Seleccion
  description: >-
    Contiene servicios web con endpoints pensados para uso de cliente externo a talento, para consultar procesos aprobados en el módulo de selección y tambien para consultar el detalle de un proceso, para poder usarlos debe primero autenticarse con el client_id y client_secret que talento cloud les suministrará

    ## Manejo de errores


        Los errores habituales pueden incluir:


        - `400 Bad Request`: Parámetros requeridos faltantes o con formato
        inválido.
            
        - `401 Unauthorized`: Token JWT inválido, expirado o ausente.
            
        - `403 Forbidden`: El usuario autenticado no tiene permisos suficientes.
            
        - `404 Not Found`: El recurso solicitado no existe.
            
        - `500 Internal Server Error`: Error inesperado en el servidor.
            

        Cuando sea posible, cada endpoint detallará sus códigos de error
        específicos y estructura de respuesta en su propia descripción.  
  contact: {}
  version: '1.0'
servers:
- url: https://clientex.talento.cloud/api/html
  description: Servidor de producción     
- url: https://clientex.talento-dev.cloud/api/html
  description: Servidor de pruebas
  variables: {}
paths:
  /oauth2/token/{tenant}.json:
    post:
      tags:
      - Selección
      summary: oauth2
      description: >-
        Para generar JWT que se usará en las siguientes peticiones, este tiene un TTL de 15 minutos.

        ## Ejemplo petición con curl:

        ```bash

        curl -X POST https://clientex.talento.cloud/api/html/oauth2/token/landers.json \
          -H "Content-Type: application/x-www-form-urlencoded" \          
          -d "grant_type=client_credentials" \
          -d "client_id=mi-id" \
          -d "client_secret=mi-secreto" \
          -d "scope=talento.seleccion.read"

        ```

        ## Ejemplo uso token generado:

        ```bash

        curl -X POST https://clientex.talento.cloud/api/v1/servicex  \
          -H "Authorization: Bearer eyJhbGci..."

        ```      
      operationId: oauth2
      parameters:
        - name: tenant
          in: path
          description: Nombre del tenant, y para la empresa Landers sería landers
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            encoding: {}
            schema:
              required:
              - client_id
              - client_secret
              - grant_type
              - scope
              type: object
              properties:
                client_id:
                  type: string
                  description: El client_id que talento cloud les suministra
                  example: 97b7ff796138dfafd06b6820yyyy
                client_secret:
                  type: string
                  description: El client_secret que talento cloud les suministra
                  example: 430ca6bcb26f352b8f9e0c0e42f6a95e83d808cb17d5dxxxxx
                grant_type:
                  type: string
                  description: Por defecto client_credentials
                  example: client_credentials
                scope:
                  type: string
                  description: Por defecto talento.read
                  example: talento.seleccion.read
        required: false
      responses:
        '200':
          description: OK
          headers:
            Vary:
              content:
                text/plain:
                  schema:
                    type: string
                  example: Origin
            Content-Language:
              content:
                text/plain:
                  schema:
                    type: string
                  example: es-CO
            Cache-Control:
              content:
                text/plain:
                  schema:
                    type: string
                  example: no-store
            X-XSS-Protection:
              content:
                text/plain:
                  schema:
                    type: string
                  example: 1; mode=block
            X-Frame-Options:
              content:
                text/plain:
                  schema:
                    type: string
                  example: DENY
            X-Content-Type-Options:
              content:
                text/plain:
                  schema:
                    type: string
                  example: nosniff
            Content-Security-Policy:
              content:
                text/plain:
                  schema:
                    type: string
                  example: frame-ancestors 'self' https://*.talento-dev.cloud https://*.talento.cloud http://localhost:*
            Transfer-Encoding:
              content:
                text/plain:
                  schema:
                    type: string
                  example: chunked
            Server:
              content:
                text/plain:
                  schema:
                    type: string
                  example: Jetty(8.y.z-SNAPSHOT)
          content:
            application/json;charset=UTF-8:
              schema:
                allOf:
                - $ref: '#/components/schemas/oauth2'
                - example:
                    acces_token: eyJhbGciOiJIUzM4NCJ9.eyJzdWIiOiJ0YWxlbnRvLnNlbGVjxxx
                    token_type: Bearer
                    expires_in: 900
                    success: true
                    scope: talento.seleccion.read
              example:
                acces_token: eyJhbGciOiJIUzM4NCJ9.eyJzdWIiOiJ0YWxlbnRvLnNlbGVjY2lvbxxxx
                token_type: Bearer
                expires_in: 900
                success: true
                scope: talento.seleccion.read
      deprecated: false
      security: []
